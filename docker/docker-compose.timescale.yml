services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ariyilla
      POSTGRES_DB: hms_ai_db
    volumes:
      - timescale_data:/var/lib/postgresql/data

volumes:
  timescale_data:
